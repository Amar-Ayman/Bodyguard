<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bodyguard - Complete Payment</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .payment-container {
            max-width: 600px;
            margin: 40px auto;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 15px;
            border: 1px solid #333;
        }
        .order-summary {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
        }  
        .order-summary h3 {
            color: var(--secondary-color);
            margin-bottom: 15px;
        }
        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        .card-icons {
            display: flex;
            gap: 10px;
            font-size: 2rem;
            margin-bottom: 20px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">Bodyguard</a>
    </header>

    <main>
        <div class="payment-container">
            <h2 style="text-align: center; margin-bottom: 30px; color: #d4ac0d;">Complete Your Payment</h2>
            
            <div class="order-summary">
                <h3>Booking Summary</h3>
                <div class="summary-item">
                    <span>Guard:</span>
                    <strong>Ammar Ayman</strong>
                </div>
                <div class="summary-item">
                    <span>Service:</span>
                    <strong>Private Party Security (5 Hours)</strong>
                </div>
                <div class="summary-item" style="border-top: 1px solid #444; padding-top: 10px; margin-top: 10px;">
                    <span>Total:</span>
                    <strong style="color: #d4ac0d; font-size: 1.2rem;">$250.00</strong>
                </div>
            </div>

            <form id="payment-form">
                <div class="card-icons">
                    <i class="fab fa-cc-visa"></i>
                    <i class="fab fa-cc-mastercard"></i>
                    <i class="fab fa-cc-amex"></i>
                </div>
                <div class="form-group">
                    <label for="card-name">Name on Card</label>
                    <input type="text" id="card-name" required placeholder="Enter name as it appears on card">
                </div>
                <div class="form-group">
                    <label for="card-number">Card Number</label>
                    <input type="text" id="card-number" required placeholder="**** **** **** ****">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                    <div class="form-group">
                        <label for="expiry">Expiry Date</label>
                        <input type="text" id="expiry" required placeholder="MM/YY">
                    </div>
                    <div class="form-group">
                        <label for="cvv">CVV</label>
                        <input type="password" id="cvv" required placeholder="***">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px; font-size: 1.1rem;">Pay Now</button>
            </form>
        </div>
    </main>

    <script>
        document.getElementById('payment-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = 'Processing...';
            btn.disabled = true;

            setTimeout(() => {
                window.location.href = 'confirmation.html';
            }, 2000);
        });
    </script>

    <footer>
        <p>All Rights Reserved &copy; 2026 Bodyguard Platform</p>
    </footer>
</body>
</html>
